# Builds the Astro site and deploys it to GitHub Pages (diskarte.jp).
# Deployment remains a founder act: it runs only on push to main
# (or manual dispatch) — never from forks or PRs.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # ADR 0045 §5 guard: zero GitHub-secrets dependencies, enforced on the
  # parsed workflow tree; plus actionlint. This repo is secretless BY DESIGN
  # — the guard keeps it that way.
  policy:
    name: workflow-secret-policy + actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash) 1.7.7
          SHELLCHECK_OPTS='--severity=warning' ./actionlint -color
      - uses: diskarte/actions/workflow-secret-policy@942becea881ae9b1d17a6068bdd87d48d0cef62e # custody tooling v1.2 (root-identifier policy)
